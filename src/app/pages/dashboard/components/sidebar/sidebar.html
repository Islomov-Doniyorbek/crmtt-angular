<div class="relative w-62.5 h-screen bg-[#F1F2F6] pb-5">
    <div class="py-5 px-3 w-full flex justify-around items-center">
        <div class="w-8 h-8 flex items-center justify-center text-white font-semibold bg-linear-to-r from-yellow-600 to-green-600 rounded-full">
            {{user.username[0] | titlecase}}
        </div>
        <div class="bio">
            <small class="font-light">Welcome back!</small>
            <h2 class="text-lg font-medium">{{user.username |titlecase}}</h2>
        </div>
        <div class="px-3 py-1 rounded-md border border-gray-200 bg-white">
            <lucide-icon name="settings" class="text-gray-500"></lucide-icon>
        </div>
    </div>
    <ul class="w-full bottom-1 py-3 px-3">
        @for (item of linkItems; track $index) {
            <li 
                [routerLink]="item.path"
                class="flex w-full justify-between items-center rounded-l-full gap-4 py-3 px-4
                transition duration-500 hover:bg-white    
                ">
                <div class="flex gap-4">
                    <lucide-icon [name]="item.icon"
                     
                     class="text-gray-600 font-thin w-4"></lucide-icon>
                    <p class="text-gray-600 font-thin">{{item.name}}</p>
                </div>
                <lucide-icon name="menu"></lucide-icon>
            </li>
        }
    </ul>
    <div class="bottom w-full absolute bottom-1 py-3 px-3">
        <div 
            routerLink="process"
            class="flex w-full items-center rounded-l-full gap-4 py-3 px-4
            transition duration-500 hover:bg-white    
        ">
            <lucide-icon name="hand-fist" class="text-gray-600 font-thin w-4"></lucide-icon>
            <p class="text-gray-600 font-thin">Support</p>
        </div>
        <div 
            routerLink="login"
            class="flex w-full items-center rounded-l-full gap-4 py-3 px-4
            transition duration-500 hover:bg-white    
        ">
            <lucide-icon name="power" class="text-gray-600 font-thin w-4"></lucide-icon>
            <p class="text-gray-600 font-thin" >Sign out</p>
        </div>
    </div>
</div>
